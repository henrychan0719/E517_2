<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究團隊進度牆</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 40px 20px; color: #334155; }
        .container { max-width: 1000px; margin: 0 auto; text-align: center; }
        h1 { margin-bottom: 40px; color: #1e293b; }

        /* 卡片佈局 */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .avatar { width: 80px; height: 80px; background: #cbd5e1; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; font-weight: bold; }
        .name { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
        .short-desc { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; }

        /* 彈窗內容樣式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; max-width: 500px; width: 90%; position: relative; text-align: left; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #94a3b8; }
        
        .tag { display: inline-block; background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>目前研究進度</h1>
    
    <div class="team-grid">
        <div class="card" onclick="openModal('member1')">
            <div class="avatar" style="background: #3b82f6;">H</div>
            <div class="name">T</div>
            <div class="short-desc">TEST</div>
            <div class="tag">TEST</div>
            <br>
            <button class="btn">查看詳情</button>
        </div>

        <div class="card" onclick="openModal('member2')">
            <div class="avatar" style="background: #10b981;">A</div>
            <div class="name">成員 A</div>
            <div class="short-desc">TEST</div>
            <div class="tag">Embedded Systems</div>
            <br>
            <button class="btn">查看詳情</button>
        </div>

        <div class="card" onclick="openModal('member3')">
            <div class="avatar" style="background: #f59e0b;">B</div>
            <div class="name">沈群博</div>
            <div class="short-desc">TEST</div>
            <div class="tag">Shen Chun-Po</div>
            <br>
            <button class="btn">查看詳情</button>
        </div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-name">姓名</h2>
        <p id="modal-detail">詳細內容載入中...</p>
        <hr>
        <h4>當前項目：</h4>
        <ul id="modal-list">
            </ul>
    </div>
</div>

<script>
    const data = {
        member1: {
            name: "-",
            desc: "專注於 Mamba 系列架構在電腦視覺的應用。",
            items: ["-"]
        },
        member2: {
            name: "Super Resolution",
            desc: "超解析度",
            items: ["自制架構，psnr高達25.9"]
        },
        member3: {
            name: "-",
            desc: "-",
            items: ["-"]
        }
    };

    function openModal(id) {
        const m = data[id];
        document.getElementById('modal-name').innerText = m.name;
        document.getElementById('modal-detail').innerText = m.desc;
        
        const list = document.getElementById('modal-list');
        list.innerHTML = "";
        m.items.forEach(item => {
            let li = document.createElement('li');
            li.innerText = item;
            list.appendChild(li);
        });

        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    // 點擊彈窗外面也可以關閉
    window.onclick = function(event) {
        if (event.target == document.getElementById('modal')) {
            closeModal();
        }
    }
</script>

</body>
</html>
